- hosts: gitlab-runner
  become: true
  tasks:
    - name: Check if GitLab Runner config exists.
      ansible.builtin.stat: path=/etc/gitlab-runner/config.toml
      register: gitlab_runner_config

    - name: Check if token runner detail exists in config.toml
      ansible.builtin.command: grep -q 'token =' /etc/gitlab-runner/config.toml
      register: runner_token_check
      changed_when: false
      failed_when: false
      when: gitlab_runner_config.stat.exists

    - name: Determine if runner is registered
      ansible.builtin.set_fact:
        runner_registered: "{{ gitlab_runner_config.stat.exists and runner_token_check.rc == 0 }}"

    - name: Report registration status
      ansible.builtin.debug:
        msg: "{{ ansible_hostname }} is {{ 'registered' if runner_registered else 'not registered' }}"

    - name: Extract runner details
      ansible.builtin.shell: grep '{{ item }}.=' /etc/gitlab-runner/config.toml | awk -F '"' '{print $2}'
      loop:
        - name
        - token
      register: runner_details
      when: runner_registered

    - name: Extract the first runner's name and token
      ansible.builtin.set_fact:
        runner_name: "{{ runner_details.results[0].stdout }}"
        runner_token: "{{ runner_details.results[1].stdout }}"
      when: runner_details.results | length > 0 and runner_registered

    - name: Unregister GitLab Runner with GitLab instance.
      ansible.builtin.command: >
        gitlab-runner unregister
        --url {{ gitlab_external_url }}
        --token {{ runner_token }}
      when: runner_registered

    - name: Unregister GitLab Runner via GitLab API
      ansible.builtin.uri:
        url: "{{ gitlab_external_url }}api/v4/runners"
        method: DELETE
        body_format: form-urlencoded
        body:
          token: "{{ runner_token }}"
        status_code: 204
      when: runner_registered

    - name: Stop GitLab Runner service
      ansible.builtin.systemd:
        name: gitlab-runner
        state: stopped
      when: runner_registered

    - name: Delete GitLab Runner configuration directory and temporary file.
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/gitlab-runner
      when: runner_registered
